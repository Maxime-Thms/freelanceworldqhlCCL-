<!DOCTYPE html>
<html>
  <head>
    <title>FreelanceWorld</title>
    <meta charset="utf-8">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fjalla+One&display=swap" rel="stylesheet">

  </head>
  <body>
    <div class="banner">
      <div class="container">
        <h1>Hire the best freelance developers</h1>
        <h2>FreelanceWorld connects you with top tech talent locally</h2>
        <a href="#apply-section" class="btn-blue">Hire now</a>
      </div>
    </div>

    <div class="container">
      <h2>Our local markets</h2>
      <div class="cards">
        <div class="card">
          <img src="images/tokyo.png" alt="FreelanceWorld Tokyo">
          <h3>Tokyo Market</h3>
        </div>

        <div class="card">
          <img src="images/berlin.png" alt="FreelanceWorld Berlin">
          <h3>Berlin Market</h3>
        </div>

        <div class="card">
          <img src="images/new-york.png" alt="FreelanceWorld New-York">
          <h3>New-York Market</h3>
        </div>

        <div class="card">
          <img src="images/stockholm.jpg" alt="FreelanceWorld Stockholm">
          <h3>Stockholm Market</h3>
        </div>
      </div>
    </div>

      <div id="apply-section">
      <div data-tf-live="01KNAFFM39REJ7N0YRTKNK7WYE"></div>
      <script src="https://embed.typeform.com/next/embed.js"></script>
    </div>
</body>
</html>
